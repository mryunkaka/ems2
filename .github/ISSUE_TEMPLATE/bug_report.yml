name: Bug report
description: Report a reproducible EMS2 bug
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real patient, employee, applicant, salary, credential, or medical data.
  - type: input
    id: module
    attributes:
      label: Module or page
      placeholder: "Example: dashboard/setting_akun.php"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, PHP version, database version, deployment type.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove private data before attaching anything.
