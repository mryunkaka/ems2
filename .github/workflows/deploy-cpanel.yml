name: Deploy PHP Website to cPanel (SFTP)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cpanel-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: mbstring, curl, openssl, json, zip, pdo_mysql

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Write lftp deploy script
        # Tulis ke file agar karakter & di password tidak dieksekusi shell
        env:
          FTP_HOST: ${{ secrets.SERVER }}
          FTP_USER: ${{ secrets.USERNAME }}
          FTP_PASS: ${{ secrets.PASSWORD }}
        run: |
          cat > /tmp/lftp_deploy.sh << EOF
          set sftp:auto-confirm yes
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ssl:verify-certificate no
          open sftp://${FTP_USER}:${FTP_PASS}@${FTP_HOST}:22
          mirror \\
            --reverse \\
            --delete \\
            --verbose \\
            --exclude-glob .git \\
            --exclude-glob .github/ \\
            --exclude-glob .env \\
            --exclude-glob .env.* \\
            --exclude-glob .ftpquota \\
            --exclude-glob node_modules/ \\
            --exclude-glob storage/ \\
            --exclude-glob backup/ \\
            --exclude-glob *.sql \\
            --exclude-glob cron/error_log \\
            --exclude-glob actions/error_log \\
            . /home/emsrhhar/public_html/
          bye
          EOF

      - name: Deploy via SFTP (lftp)
        run: lftp -f /tmp/lftp_deploy.sh

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/lftp_deploy.sh

      - name: Notify Deploy Success
        if: success()
        run: echo "✅ Deploy berhasil!"

      - name: Notify Deploy Failed
        if: failure()
        run: echo "❌ Deploy gagal! Cek log di atas."
