name: Deploy PHP Website to cPanel (FTP)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-cpanel-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: mbstring, curl, openssl, json, zip, pdo_mysql

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress --optimize-autoloader
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp        # ← Diubah: ftps → ftp (FTPS port 21 sering diblokir)
          port: 21
          security: loose      # ← Ditambah: izinkan koneksi tanpa strict TLS
          timeout: 60000       # ← Ditambah: timeout 60 detik (default 30s terlalu cepat)
          server-dir: /        # ← Diubah: gunakan / bukan ./ untuk root FTP
          local-dir: ./
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/.env.*
            **/.ftpquota
            **/node_modules/**
            **/storage/**
            **/backup/**
            **/*.sql
            **/cron/error_log
            **/actions/error_log
