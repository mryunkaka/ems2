location ^~ /storage/ { deny all; return 403; }
location ^~ /backup/ { deny all; return 403; }
location ^~ /logs/ { deny all; return 403; }
location ^~ /docs/ { deny all; return 403; }
location ^~ /migrations/ { deny all; return 403; }
location ^~ /node_modules/ { deny all; return 403; }
location ^~ /vendor/ { deny all; return 403; }
location ^~ /private_artifacts/ { deny all; return 403; }

location ~* \.(sql|zip|bak|env|ini|log|md|lock)$ { deny all; }
location ~* /(composer\.(json|lock)|package(-lock)?\.json|deploy\.sh|deploy-cron\.php|backfill_operations\.php|flush_setting_akun_cache\.php)$ { deny all; }

location ~* ^/(storage|backup|logs)/.*\.(php|phtml|phar|php\d*)$ { deny all; }

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
